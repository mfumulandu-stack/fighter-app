<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fighter" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png?v=2" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png?v=2" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png?v=2" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png?v=2" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=2" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png?v=2" />

    <link rel="shortcut icon" href="/icons/icon-192.png?v=2" />

    <!-- SEO -->
    <meta name="description" content="Fighter — die Kampfsport Matching App. Finde deinen nächsten Gegner, chatte mit Fightern in deiner Stadt." />
    <meta name="keywords" content="Kampfsport, Boxing, MMA, Sparring, Fighter, Matching" />

    <!-- Open Graph (WhatsApp, iMessage, Social Media Link Preview) -->
    <meta property="og:title" content="Fighter — Kampfsport Matching" />
    <meta property="og:description" content="Finde deinen nächsten Gegner. Swipe. Match. Fight. 🥊" />
    <meta property="og:image" content="https://fighterapp.de/icons/icon-512.png?v=2" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fighterapp.de" />
    <meta property="og:site_name" content="Fighter App" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Fighter — Kampfsport Matching" />
    <meta name="twitter:description" content="Finde deinen nächsten Gegner. Swipe. Match. Fight. 🥊" />
    <meta name="twitter:image" content="https://fighterapp.de/icons/icon-512.png?v=2" />

    <!-- iMessage / WhatsApp -->
    <link rel="image_src" href="https://fighterapp.de/icons/icon-512.png?v=2" />

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; background: #0d0d0d; overscroll-behavior: none; }
      #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; height: 100%; overflow: hidden; }
    </style>

    <title>Fighter — Kampfsport Matching App</title>
