<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fighter" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/icons/icon-72.png" />

    <!-- SEO -->
    <meta name="description" content="Fighter — die Kampfsport Matching App. Finde deinen naechsten Gegner, chatte mit Fightern in deiner Stadt." />
    <meta name="keywords" content="Kampfsport, Boxing, MMA, Sparring, Fighter, Matching" />

    <!-- Open Graph -->
    <meta property="og:title" content="Fighter — Kampfsport Matching" />
    <meta property="og:description" content="Finde deinen naechsten Gegner. Swipe. Match. Fight." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fighter-app-pi.vercel.app" />

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; background: #0d0d0d; overscroll-behavior: none; }
      #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>

    <title>Fighter</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
